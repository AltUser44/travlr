<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="glass-form">
      <div class="card-header">
        <h4 class="mb-0 text-white fw-bold">✏️ Edit Trip</h4>
      </div>
      <div class="card-body">
        <div *ngIf="message" class="alert alert-danger">{{ message }}</div>

        <form [formGroup]="tripForm" (ngSubmit)="onSubmit()">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Trip Code</label>
              <input type="text" class="form-control" formControlName="code" readonly>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Trip Name</label>
              <input type="text" class="form-control" formControlName="name"
                     [class.is-invalid]="submitted && f['name'].errors">
              <div class="invalid-feedback" *ngIf="submitted && f['name'].errors">Required</div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Length</label>
              <input type="text" class="form-control" formControlName="length"
                     [class.is-invalid]="submitted && f['length'].errors">
              <div class="invalid-feedback" *ngIf="submitted && f['length'].errors">Required</div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Start Date</label>
              <input type="date" class="form-control" formControlName="start"
                     [class.is-invalid]="submitted && f['start'].errors">
              <div class="invalid-feedback" *ngIf="submitted && f['start'].errors">Required</div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Resort</label>
              <input type="text" class="form-control" formControlName="resort"
                     [class.is-invalid]="submitted && f['resort'].errors">
              <div class="invalid-feedback" *ngIf="submitted && f['resort'].errors">Required</div>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Per Person ($)</label>
              <input type="text" class="form-control" formControlName="perPerson"
                     [class.is-invalid]="submitted && f['perPerson'].errors">
              <div class="invalid-feedback" *ngIf="submitted && f['perPerson'].errors">Required</div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Image URL</label>
            <input type="text" class="form-control" formControlName="image"
                   [class.is-invalid]="submitted && f['image'].errors">
            <div class="invalid-feedback" *ngIf="submitted && f['image'].errors">Required</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" formControlName="description" rows="4"
                      [class.is-invalid]="submitted && f['description'].errors"></textarea>
            <div class="invalid-feedback" *ngIf="submitted && f['description'].errors">Required</div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Update Trip</button>
            <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
