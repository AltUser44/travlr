<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="glass p-5" style="width: 100%; max-width: 420px;">
    <h2 class="text-white fw-bold mb-1 text-center">Admin Login</h2>
    <p class="text-center mb-4" style="color: rgba(200,200,255,0.75);">Sign in to manage trips</p>

    <div *ngIf="message" class="alert alert-danger">{{ message }}</div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="mb-3">
        <label for="email" class="form-label text-white">Email address</label>
        <input
          id="email"
          type="email"
          class="form-control"
          formControlName="email"
          [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
          placeholder="admin@travlr.com"
          autocomplete="email"
        />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
          <div *ngIf="f['email'].errors['required']">Email is required.</div>
          <div *ngIf="f['email'].errors['email']">Please enter a valid email.</div>
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label text-white">Password</label>
        <input
          id="password"
          type="password"
          class="form-control"
          formControlName="password"
          [ngClass]="{ 'is-invalid': submitted && f['password'].errors }"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
          <div *ngIf="f['password'].errors['required']">Password is required.</div>
        </div>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary py-2 fw-semibold">Sign In</button>
      </div>

    </form>
  </div>
</div>
