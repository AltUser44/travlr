<div>
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-white fw-bold">Available Trips</h2>
    <div class="d-flex gap-2">
      <button *ngIf="authService.isLoggedIn()" class="btn btn-primary px-4" (click)="addTrip()">+ Add Trip</button>
      <button *ngIf="authService.isLoggedIn()" class="btn btn-outline-light px-3" (click)="logout()">Logout</button>
      <a *ngIf="!authService.isLoggedIn()" routerLink="/login" class="btn btn-outline-light px-3">Admin Login</a>
    </div>
  </div>

  <div *ngIf="message" class="alert alert-danger">{{ message }}</div>

  <div class="row g-4">
    <app-trip-card
      *ngFor="let trip of trips"
      [trip]="trip"
      [isLoggedIn]="authService.isLoggedIn()"
      (tripDelete)="onTripDelete($event)">
    </app-trip-card>
  </div>

  <div *ngIf="trips.length === 0 && !message" class="text-center py-5">
    <div class="glass p-5 d-inline-block">
      <div style="font-size: 3rem;">✈️</div>
      <h4 class="mt-3 mb-1">Your next adventure awaits!</h4>
      <p class="mb-3" style="color: rgba(200,200,255,0.8);">No trips have been added yet. Be the first to curate an unforgettable getaway.</p>
      <button *ngIf="authService.isLoggedIn()" class="btn btn-primary" (click)="addTrip()">Plan a Trip</button>
    </div>
  </div>
</div>
